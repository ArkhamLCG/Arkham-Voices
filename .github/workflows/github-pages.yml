# Publishes the Vite app to GitHub Pages (Settings → Pages → Source: GitHub Actions).
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   VITE_NARRATION_BASE_URL
#   VITE_RU_NARRATION_BASE_URL
#   VITE_ARKHAM_DIVIDER_DATA_URL
#
# Values: same as in .env / .env.example (without quotes in the secret form field).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci
        env:
          GH_ACTIONS: "true"
          GH_REPOSITORY: ${{ github.repository }}
          VITE_NARRATION_BASE_URL: ${{ secrets.VITE_NARRATION_BASE_URL }}
          VITE_RU_NARRATION_BASE_URL: ${{ secrets.VITE_RU_NARRATION_BASE_URL }}
          VITE_ARKHAM_DIVIDER_DATA_URL: ${{ secrets.VITE_ARKHAM_DIVIDER_DATA_URL }}

      - name: Build
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
